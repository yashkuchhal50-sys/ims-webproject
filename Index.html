< html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #fff;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background: #fff;
            color: #333;
            cursor: pointer;
        }

        button:hover {
            background: #ddd;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    My First GitHub Website 🚀
</header>

<div class="container">
    <h1>Hello, I'm Yash 👋</h1>
    <p>Welcome to my first website hosted on GitHub!</p>
    <button onclick="showMessage()">Click Me</button>
</div>

<footer>
    © 2026 Yash | Built with ❤️
</footer>

<script>
    function showMessage() {
        alert("Thanks for visiting my website! 😊");
    }
</script>

</body>
</html>
